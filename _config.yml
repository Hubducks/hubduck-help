title: HubDuck Help
description: Help centre for HubDuck — the email assistant for schools
theme: null
remote_theme: just-the-docs/just-the-docs

url: "https://hubducks.github.io"
baseurl: "/hubduck-help"

# Search
search_enabled: true
search.button: true

# Theme
color_scheme: light
