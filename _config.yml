  - jekyll-remote-theme
  - jekyll-seo-tag

# Links in header
aux_links:
  "Go to HubDuck":
    - "https://www.hubduck.net"

aux_links_new_tab: true

# Logo (text-based)
logo: "🦆 HubDuck Help"
